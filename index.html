<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Jogo do GitHub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-board">
        <div class="score">Score: <span id="score-val">0</span></div>
        
        <div id="character" class="character"></div>
        <div id="obstacle" class="obstacle"></div>
        
        <div id="game-over-screen" class="game-over-hide">
            <h2>GAME OVER</h2>
            <p>Pressione qualquer tecla para reiniciar</p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
